<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Free instant QR code generator. Create unlimited QR codes for URLs, text, WiFi, email, phone. Custom colors, sizes & download. No signup.">
    <title>QRly • Free QR Code Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: system-ui, sans-serif;
        }

        .qr-container {
            transition: all 0.3s;
        }

        .ad-placeholder {
            background: #f3f4f6;
            border: 2px dashed #9ca3af;
            padding: 16px;
            text-align: center;
            font-size: 14px;
            color: #6b7280;
        }
    </style>
</head>

<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-white">
    <div class="max-w-3xl mx-auto p-6">
        <!-- Header -->
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-4xl font-bold flex items-center gap-3">🔲 QRly</h1>
            <button id="themeBtn" onclick="toggleTheme()"
                class="px-5 py-2 text-sm border rounded-2xl flex items-center gap-2">🌙 Dark</button>
        </div>

        <!-- Tool -->
        <div class="bg-white dark:bg-gray-900 rounded-3xl shadow-2xl p-8">
            <div class="mb-6">
                <label class="block text-sm font-medium mb-2">What do you want to encode?</label>
                <input id="data" type="text" value="https://x.ai" oninput="generateQR()"
                    class="w-full px-5 py-4 text-lg text-gray-900 dark:text-gray-900 bg-white dark:bg-white border border-gray-300 dark:border-gray-700 rounded-2xl focus:outline-none focus:border-blue-500">
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                <div>
                    <label class="block text-xs font-medium mb-1">Foreground</label>
                    <input id="fg" type="color" value="#000000" onchange="generateQR()"
                        class="w-full h-10 rounded-xl cursor-pointer">
                </div>
                <div>
                    <label class="block text-xs font-medium mb-1">Background</label>
                    <input id="bg" type="color" value="#ffffff" onchange="generateQR()"
                        class="w-full h-10 rounded-xl cursor-pointer">
                </div>
                <div>
                    <label class="block text-xs font-medium mb-1">Size</label>
                    <select id="size" onchange="generateQR()"
                        class="w-full h-10 border border-gray-300 dark:border-gray-700 rounded-2xl px-4 text-sm text-gray-900 dark:text-gray-900 bg-white dark:bg-white">
                        <option value="300">300×300</option>
                        <option value="400" selected>400×400</option>
                        <option value="500">500×500</option>
                        <option value="600">600×600</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-medium mb-1">Error correction</label>
                    <select id="ecc" onchange="generateQR()"
                        class="w-full h-10 border border-gray-300 dark:border-gray-700 rounded-2xl px-4 text-sm text-gray-900 dark:text-gray-900 bg-white dark:bg-white">
                        <option value="L">Low</option>
                        <option value="M" selected>Medium</option>
                        <option value="Q">Quality</option>
                        <option value="H">High</option>
                    </select>
                </div>
            </div>

            <!-- Live QR -->
            <div class="qr-container bg-gray-100 dark:bg-gray-800 rounded-3xl p-8 flex justify-center">
                <img id="qrImage"
                    src="https://api.qrserver.com/v1/create-qr-code/?data=https://x.ai&size=400x400&color=000000&bgcolor=ffffff&ecc=M"
                    alt="QR Code" class="shadow-md rounded-2xl max-w-[400px]">
            </div>

            <div class="flex gap-3 justify-center mt-8">
                <!-- FIX 1: Download via blob fetch to bypass cross-origin restriction -->
                <button onclick="downloadQR(this)"
                    class="flex-1 md:flex-none bg-black hover:bg-gray-800 dark:bg-white dark:text-black dark:hover:bg-gray-200 text-white font-medium px-8 py-4 rounded-2xl flex items-center justify-center gap-2">
                    ⬇️ Download PNG
                </button>
                <!-- FIX 2: Pass button element explicitly instead of relying on implicit `event` global -->
                <button onclick="copyToClipboard(this)"
                    class="flex-1 md:flex-none border border-gray-300 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-800 font-medium px-8 py-4 rounded-2xl">
                    📋 Copy Link
                </button>
            </div>
        </div>

        <!-- Quick Presets -->
        <div class="mt-10 grid grid-cols-2 sm:grid-cols-3 md:grid-cols-6 gap-3">
            <button onclick="quickPreset('https://x.ai')"
                class="bg-white dark:bg-gray-900 border hover:border-blue-500 px-4 py-3 rounded-2xl text-sm transition">URL</button>
            <button onclick="quickPreset('mailto:hello@example.com')"
                class="bg-white dark:bg-gray-900 border hover:border-blue-500 px-4 py-3 rounded-2xl text-sm transition">Email</button>
            <button onclick="quickPreset('tel:+94771234567')"
                class="bg-white dark:bg-gray-900 border hover:border-blue-500 px-4 py-3 rounded-2xl text-sm transition">Phone</button>
            <button onclick="quickPreset('WIFI:S:MyWiFi;T:WPA;P:YourPassword;H:false;;')"
                class="bg-white dark:bg-gray-900 border hover:border-blue-500 px-4 py-3 rounded-2xl text-sm transition">WiFi</button>
            <button onclick="quickPreset('https://www.instagram.com/yourprofile')"
                class="bg-white dark:bg-gray-900 border hover:border-blue-500 px-4 py-3 rounded-2xl text-sm transition">Instagram</button>
            <button onclick="quickPreset('Just some text')"
                class="bg-white dark:bg-gray-900 border hover:border-blue-500 px-4 py-3 rounded-2xl text-sm transition">Text</button>
        </div>

        <!-- AdSense 1 -->
        

        <!-- Affiliate Promo -->
        <div
            class="bg-blue-50 dark:bg-blue-950 border border-blue-200 dark:border-blue-800 rounded-3xl p-6 flex gap-4 items-center">
            <div class="text-4xl">📈</div>
            <div>
                <p class="font-medium">Need scannable analytics &amp; editable QR codes?</p>
                <a href="https://www.qrcodechimp.com" target="_blank"
                    class="text-blue-600 dark:text-blue-400 font-medium hover:underline">Try QRCodeChimp (free tier)
                    →</a>
            </div>
        </div>

        <!-- AdSense 2 -->
        

        <!-- Buy Me a Coffee -->
        
    </div>

    <footer class="text-center text-xs text-gray-500 py-12">
        Powered by qrserver.com • 100% free • No tracking • Made for passive income in 2026
    </footer>

    <script>
        let currentQRUrl = '';

        function generateQR() {
            const data = document.getElementById('data').value.trim() || 'https://x.ai';
            const size = document.getElementById('size').value;
            const fg = document.getElementById('fg').value.replace('#', '');
            const bg = document.getElementById('bg').value.replace('#', '');
            const ecc = document.getElementById('ecc').value;

            currentQRUrl = `https://api.qrserver.com/v1/create-qr-code/?data=${encodeURIComponent(data)}&size=${size}x${size}&color=${fg}&bgcolor=${bg}&ecc=${ecc}`;
            document.getElementById('qrImage').src = currentQRUrl;
        }

        // FIX 1: Fetch image as blob first to force download (bypasses cross-origin restriction)
        async function downloadQR(btn) {
            if (!currentQRUrl) return;

            const originalText = btn.innerHTML;
            btn.innerHTML = '⏳ Downloading...';
            btn.disabled = true;

            try {
                const response = await fetch(currentQRUrl);
                if (!response.ok) throw new Error('Fetch failed');
                const blob = await response.blob();
                const blobUrl = URL.createObjectURL(blob);

                const link = document.createElement('a');
                link.href = blobUrl;
                link.download = 'my-qrcode.png';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                // Revoke the blob URL after a short delay
                setTimeout(() => URL.revokeObjectURL(blobUrl), 1000);

                btn.innerHTML = '✅ Downloaded!';
            } catch (err) {
                console.error('Download error:', err);
                btn.innerHTML = '❌ Failed – try again';
            }

            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }, 2000);
        }

        // FIX 2: Button element passed explicitly — no reliance on implicit `event` global
        function copyToClipboard(btn) {
            const data = document.getElementById('data').value.trim();
            if (!data) return;
            navigator.clipboard.writeText(data).then(() => {
                const original = btn.innerHTML;
                btn.innerHTML = '✅ Copied!';
                setTimeout(() => btn.innerHTML = original, 2000);
            });
        }

        function quickPreset(text) {
            document.getElementById('data').value = text;
            generateQR();
            document.getElementById('qrImage').scrollIntoView({ behavior: 'smooth' });
        }

        // FIX 3: Toggle button label between Dark / Light correctly
        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            document.getElementById('themeBtn').innerHTML = isDark ? '☀️ Light' : '🌙 Dark';
        }

        window.onload = () => {
            generateQR();
        };
    </script>
</body>

</html>
